<!DOCTYPE html>
<html lang="en" class="dark no-js">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohammed Asif - Full-Stack Developer & Data Scientist</title>
    <meta name="description" content="Portfolio of Mohammed Asif, a Full-Stack Developer and Data Science Enthusiast. Delivering smart solutions with AI and precision." />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- GSAP & Plugins -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>
    
    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    
    <script>
      // Register GSAP Plugins
      gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

      // Initialize Lenis
      document.addEventListener('DOMContentLoaded', () => {
        const lenis = new Lenis({
          duration: 0.8, // Reduced for faster feel
          easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
          orientation: 'vertical',
          gestureOrientation: 'vertical',
          smoothWheel: true,
          wheelMultiplier: 1.1, // Slightly increased for more responsive scroll
          smoothTouch: false,
          touchMultiplier: 2,
          infinite: false,
        });

        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
        
        // Connect Lenis to ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => {
          lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);
      });
    </script>
    
    <style>
      /* Fail-safe: ensure content is visible if JS fails */
      .gsap-reveal { opacity: 0; }
      .no-js .gsap-reveal { opacity: 1 !important; transform: none !important; }
      /* Global hide for content before GSAP loads */
      .opacity-0 { opacity: 0; }
      .no-js .opacity-0 { opacity: 1 !important; }

      /* Noise Texture Overlay */
      .noise-bg::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.02;
        pointer-events: none;
        z-index: 50;
        background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" /%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" /%3E%3C/svg%3E');
      }
    </style>
    <script>document.documentElement.classList.remove('no-js');</script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />

    <style>
      .glass {

        border: 1px solid rgba(255,255,255,0.1);
      }
      .text-gradient {
        background: linear-gradient(135deg, #00F0FF 0%, #00d0e6 100%);

        background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
        animation: gradient-flow 5s linear infinite;
        text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
      }

        100% { background-position: 0% 50%; }
      }
      .glow-on-hover:hover {

      }
      .material-symbols-outlined {

      }
      /* Smooth scrolling for anchor links */

      }
